<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Cardinal's SpotN'Fix</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
</head>
<body class="auth-body">
  <header class="site-header">
    <a href="../../index.html" class="logo">
      <img src="../../assets/images/logo.png" alt="Cardinal's SpotN'Fix logo" />
    </a>
    <div class="header-controls">
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primary-navigation" aria-label="Toggle navigation menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <a href="login.html" class="user-icon" aria-label="Login">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </a>
    </div>
    <nav class="main-nav" id="primary-navigation">
      <a href="../../index.html">Home</a>
      <a href="../../about.html">About</a>
      <a href="../../features.html">Features</a>
      <a href="../system/reports.html">Report Issue</a>
      <a href="../system/reports.html#track">Track Reports</a>
      <a href="../../contact.html">Contact us</a>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-bg" aria-hidden="true"></div>
    <section class="auth-split-card" aria-labelledby="reset-title">
      <div class="auth-visual">
        <div class="auth-visual-overlay" aria-hidden="true"></div>
        <p class="auth-visual-tagline">Reset your password securely.</p>
      </div>
      <div class="auth-form-panel">
        <h1 class="auth-title" id="reset-title">Reset Password</h1>
        <p class="auth-hint">Enter the email and ID number from your account, then choose a new password.</p>
        <form class="auth-form" id="reset-form" novalidate>
          <input class="auth-input" id="reset-email" type="email" placeholder="Registered email" required />
          <input class="auth-input" id="reset-id-number" type="number" placeholder="ID number" required />
          <input class="auth-input" id="reset-password" type="password" placeholder="New password (min. 6 characters)" required />
          <input class="auth-input" id="reset-confirm" type="password" placeholder="Confirm new password" required />
          <p class="auth-error" id="reset-error" aria-live="polite"></p>
          <p class="contact-success" id="reset-success" aria-live="polite"></p>
          <button class="auth-submit" type="submit">Update Password</button>
        </form>
        <a class="auth-switch-link" href="login.html">Back to login</a>
      </div>
    </section>
  </main>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth-helper.js"></script>
  <script src="../../assets/js/system-status.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/reset-password.js"></script>
</body>
</html>
