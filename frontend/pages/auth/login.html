<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Cardinal's SpotN'Fix</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
</head>
<body class="auth-body">
  <header class="site-header">
    <a href="../../index.html" class="logo">
      <img src="../../assets/images/logo.png" alt="Cardinal's SpotN'Fix logo" />
    </a>
    <div class="header-controls">
      <button
        type="button"
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="primary-navigation"
        aria-label="Toggle navigation menu"
      >
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <a href="login.html" class="user-icon" aria-label="Login">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </a>
    </div>
    <nav class="main-nav" id="primary-navigation">
      <a href="../../index.html">Home</a>
      <a href="../../about.html">About</a>
      <a href="../../features.html">Features</a>
      <a href="../system/reports.html">Report Issue</a>
      <a href="../system/reports.html#track" data-nav-track>Track Reports</a>
      <a href="../../contact.html" data-nav-contact>Contact us</a>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-bg" aria-hidden="true"></div>
    <div class="auth-deco-squares" aria-hidden="true">
      <span class="sq sq-red auth-deco auth-deco-tl"></span>
      <span class="sq sq-grey auth-deco auth-deco-ml"></span>
      <span class="sq sq-dark auth-deco auth-deco-br"></span>
      <span class="sq sq-yellow auth-deco auth-deco-fr"></span>
    </div>
    <section class="auth-split-card" aria-labelledby="login-title">
      <div class="auth-visual">
        <div class="auth-visual-overlay" aria-hidden="true"></div>
        <p class="auth-visual-tagline">Point out the problem, Power the solution.</p>
      </div>
      <div class="auth-form-panel">
        <h1 class="auth-title" id="login-title">Welcome!</h1>
        <form class="auth-form" id="login-form" novalidate>
          <input class="auth-input" id="login-email" name="email" type="email" placeholder="Email" autocomplete="email" required />
          <input class="auth-input" id="login-password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
          <p class="auth-error" id="login-error" aria-live="polite"></p>
          <button class="auth-submit" type="submit">Log In</button>
        </form>
        <a class="auth-switch-link" href="reset-password.html">Forgot password?</a>
        <a class="auth-switch-link" href="register.html">Don't have an account? Sign up</a>
      </div>
    </section>
  </main>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth-helper.js"></script>
  <script src="../../assets/js/system-status.js"></script>
  <script src="../../assets/js/user-menu.js"></script>
  <script src="../../assets/js/navigation.js"></script>
  <script src="../../assets/js/login.js"></script>
</body>
</html>
